# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
       backend-dependencies:
          applies-to: version-updates
          patterns:
            - "*"
    ignore:
      # These are peer deps of Cargo and should not be automatically bumped
      - dependency-name: "semver"
      - dependency-name: "crates-io"
      # Ignore major updates for all dependencies
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "docker"
    # Dockerfiles live under the module directories, not the repo root
    directories:
      - "/modules/dpe"
      - "/modules/mosaic/playground"
    # Check for updates once a week
    schedule:
      interval: "weekly"
  - package-ecosystem: "npm"
    # The Playwright e2e suites are the only Node footprint in the repo
    directories:
      - "/modules/dpe/web-e2e-tests"
      - "/modules/mosaic/playground-e2e-tests"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      e2e-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
    ignore:
      # Ignore major updates for all dependencies
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
