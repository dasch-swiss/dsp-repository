name: a11y / dpe

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "modules/dpe/web/**"
      - "modules/dpe/style/**"
      - "modules/dpe/public/**"
      - "modules/dpe/web-e2e-tests/**"
  pull_request:
    paths:
      - "modules/dpe/web/**"
      - "modules/dpe/style/**"
      - "modules/dpe/public/**"
      - "modules/dpe/web-e2e-tests/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  a11y:
    runs-on: ubuntu-latest
    name: a11y / dpe / WCAG 2.1 AA
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install cargo-leptos
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-leptos@0.3.4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install JS dependencies
        run: cd modules/dpe && pnpm install

      - name: Install web-e2e-tests dependencies
        run: cd modules/dpe/web-e2e-tests && npm install

      - name: Install Playwright browsers
        run: cd modules/dpe/web-e2e-tests && npx playwright install chromium --with-deps

      - name: Build dpe
        run: |
          # cargo-leptos 0.3.4 expects binary at target/release/{package-name} but
          # [[bin]] name = "dpe" produces target/release/dpe. Build with cargo-leptos
          # (which handles Tailwind/site assets) and ignore the post-build copy failure,
          # then create a compatibility symlink.
          cargo leptos build --project=dpe --release || true
          if [ -f target/release/dpe ] && [ ! -f target/release/dpe-server ]; then
            ln -s dpe target/release/dpe-server
          fi

      - name: Run accessibility tests
        run: just test-a11y-dpe

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-a11y-dpe
          path: modules/dpe/web-e2e-tests/playwright-report/
          retention-days: 7
