name: Cloud Run PR Preview for DPE

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "modules/dpe/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # Required for Workload Identity Federation (OIDC token request)
  pull-requests: write

concurrency:
  group: cloud-run-dpe-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  SERVICE_NAME: dpe-pr-${{ github.event.pull_request.number }}
  IMAGE_TAG: pr-${{ github.event.pull_request.number }}

jobs:
  # --------------------------------------------------------------------------
  # Build DPE outside Docker with Swatinem/rust-cache for fast incremental builds.
  # --------------------------------------------------------------------------
  build:
    name: Build DPE
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends musl-tools clang

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-leptos
        run: cargo binstall cargo-leptos -y --force

      - name: Add build targets
        run: rustup target add wasm32-unknown-unknown x86_64-unknown-linux-musl

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Install pnpm and dependencies
        run: |
          npm install -g pnpm
          cd modules/dpe && CI=true pnpm install --frozen-lockfile

      - name: Build site assets
        run: cargo leptos build --project dpe --release -vv

      - name: Build static musl binary
        run: cargo build -p dpe-server --release --target x86_64-unknown-linux-musl

      - name: Stage artifacts
        run: |
          mkdir -p staging
          cp target/x86_64-unknown-linux-musl/release/dpe-server staging/
          cp -r modules/dpe/target/site staging/
          cp -r modules/dpe/server/data staging/
          cp modules/dpe/Dockerfile staging/

      - uses: actions/upload-artifact@v4
        with:
          name: dpe-build
          path: staging/
          retention-days: 1

  # --------------------------------------------------------------------------
  # Package pre-built artifacts into a Docker image and deploy to Cloud Run.
  # --------------------------------------------------------------------------
  deploy-preview:
    name: Deploy DPE preview
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dpe-build
          path: staging/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: staging/
          file: staging/Dockerfile
          push: true
          tags: ${{ secrets.GCP_ARTIFACT_REGISTRY }}/dpe:${{ env.IMAGE_TAG }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ secrets.GCP_REGION }}
          image: ${{ secrets.GCP_ARTIFACT_REGISTRY }}/dpe:${{ env.IMAGE_TAG }}
          flags: >-
            --port=8080
            --allow-unauthenticated
            --cpu=1
            --memory=512Mi
            --max-instances=1
            --cpu-throttling

      - name: Find existing preview comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- dpe-preview -->"

      - name: Post or update preview URL comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          edit-mode: replace
          body: |
            <!-- dpe-preview -->
            ### DPE Preview

            | | |
            |---|---|
            | **Preview URL** | ${{ steps.deploy.outputs.url }} |
            | **Cloud Run Service** | `${{ env.SERVICE_NAME }}` |
            | **Commit** | ${{ github.event.pull_request.head.sha }} |

            _This preview is updated on every push to this PR._

  # --------------------------------------------------------------------------
  # Clean up Cloud Run service when the PR is closed or merged.
  # --------------------------------------------------------------------------
  cleanup-preview:
    name: Clean up DPE preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete Cloud Run service (if it exists)
        run: |
          gcloud run services delete "$SERVICE_NAME" \
            --region="${{ secrets.GCP_REGION }}" \
            --quiet 2>/dev/null || echo "Service $SERVICE_NAME not found, nothing to clean up."

      - name: Delete container image (if it exists)
        run: |
          gcloud artifacts docker images delete \
            "${{ secrets.GCP_ARTIFACT_REGISTRY }}/dpe:${{ env.IMAGE_TAG }}" \
            --delete-tags --quiet 2>/dev/null || echo "Image not found, nothing to clean up."
