name: Docker publish DPE image

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    name: Build DPE
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Compute image tag
        id: tag
        run: echo "tag=$(git describe --tags --match 'v*' | sed 's/^v//')" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/build-dpe

      - uses: actions/upload-artifact@v4
        with:
          name: dpe-build
          path: staging/
          retention-days: 1

  publish:
    name: Publish DPE image
    runs-on: ubuntu-latest
    needs: build
    outputs:
      tag: ${{ needs.build.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dpe-build
          path: staging/

      - uses: ./.github/actions/docker-publish
        with:
          context: staging/
          dockerfile: staging/Dockerfile
          tags: daschswiss/dpe:${{ needs.build.outputs.tag }}
          docker-user: ${{ secrets.DOCKER_USER }}
          docker-hub-token: ${{ secrets.DOCKER_HUB_TOKEN }}

  trigger-dev-deployment:
    name: Trigger deployment to DEV
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Trigger deployment to DEV
        env:
          IMAGE_TAG: ${{ needs.publish.outputs.tag }}
          JENKINS_BASIC_AUTH_USER: ${{ secrets.JENKINS_BASIC_AUTH_USER }}
          JENKINS_BASIC_AUTH_PASS: ${{ secrets.JENKINS_BASIC_AUTH_PASS }}
          JENKINS_UPDATE_RELEASE_WEBHOOK: ${{ secrets.JENKINS_UPDATE_REPOSITORY_DEV_WEBHOOK }}
        run: |
          curl -f -u "${JENKINS_BASIC_AUTH_USER}:${JENKINS_BASIC_AUTH_PASS}" \
               -X POST "${JENKINS_UPDATE_RELEASE_WEBHOOK}" \
               -d "Service=dpe&Version=${IMAGE_TAG}"
