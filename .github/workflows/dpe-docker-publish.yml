name: Docker publish DPE image

on:
  push:
    branches:
      - main
    paths:
      - "modules/leptos-dpe/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  compute-tag:
    name: Compute image tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate docker image tag
        id: tag
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          VERSION=$(jq -r '.["modules/leptos-dpe/server"]' .release-please-manifest.json)
          SHORT_SHA=$(echo "${COMMIT_SHA}" | cut -c1-7)
          echo "tag=${VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  publish:
    name: Build and publish DPE
    needs: compute-tag
    uses: ./.github/workflows/docker-publish.yml
    with:
      dockerfile: modules/leptos-dpe/Dockerfile
      image-name: daschswiss/dpe
      image-tag: ${{ needs.compute-tag.outputs.tag }}
    secrets:
      DOCKER_USER: ${{ secrets.DOCKER_USER }}
      DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
