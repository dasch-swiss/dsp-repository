name: Publish DPE release image

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  compute-tag:
    name: Compute image tag
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'dpe-v')
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Extract version from Cargo.toml
        id: tag
        run: |
          VERSION=$(grep -m1 '^version' modules/leptos-dpe/server/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish release image
    needs: compute-tag
    uses: ./.github/workflows/docker-publish.yml
    with:
      dockerfile: modules/leptos-dpe/Dockerfile
      image-name: daschswiss/dpe
      image-tag: ${{ needs.compute-tag.outputs.tag }}
    secrets:
      DOCKER_USER: ${{ secrets.DOCKER_USER }}
      DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
