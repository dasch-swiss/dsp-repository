name: Publish DPE release image

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  compute-tag:
    name: Compute image tag
    runs-on: ubuntu-latest
    # Tag prefix must match the "component" name for modules/dpe/server
    # in release-please-config.json (with include-component-in-tag: true).
    if: startsWith(github.event.release.tag_name, 'leptos-server-v')
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Extract version from tag
        id: tag
        run: |
          echo "tag=${GITHUB_REF_NAME#leptos-server-v}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish release image
    needs: compute-tag
    uses: ./.github/workflows/docker-publish.yml
    with:
      dockerfile: modules/dpe/Dockerfile
      image-name: daschswiss/dpe
      image-tag: ${{ needs.compute-tag.outputs.tag }}
    secrets:
      DOCKER_USER: ${{ secrets.DOCKER_USER }}
      DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

  trigger-stage-deployment:
    name: Trigger deployment to STAGE
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Trigger deployment to STAGE
        env:
          IMAGE_TAG: ${{ needs.publish.outputs.tag }}
          JENKINS_BASIC_AUTH_USER: ${{ secrets.JENKINS_BASIC_AUTH_USER }}
          JENKINS_BASIC_AUTH_PASS: ${{ secrets.JENKINS_BASIC_AUTH_PASS }}
          JENKINS_UPDATE_RELEASE_WEBHOOK: ${{ secrets.JENKINS_UPDATE_DPE_STAGE_WEBHOOK }}
        run: |
          curl -f -u "${JENKINS_BASIC_AUTH_USER}:${JENKINS_BASIC_AUTH_PASS}" \
               -X POST "${JENKINS_UPDATE_RELEASE_WEBHOOK}" \
               -d "Service=dpe&Version=${IMAGE_TAG}"
