name: Publish DPE release image

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build DPE release
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v')
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Extract version from tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/build-dpe

      - uses: actions/upload-artifact@v4
        with:
          name: dpe-release-build
          path: staging/
          retention-days: 1

  publish:
    name: Publish release image
    runs-on: ubuntu-latest
    needs: build
    outputs:
      tag: ${{ needs.build.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dpe-release-build
          path: staging/

      - uses: ./.github/actions/docker-publish
        with:
          context: staging/
          dockerfile: staging/Dockerfile
          tags: daschswiss/dpe:${{ needs.build.outputs.tag }}
          docker-user: ${{ secrets.DOCKER_USER }}
          docker-hub-token: ${{ secrets.DOCKER_HUB_TOKEN }}

  trigger-stage-deployment:
    name: Trigger deployment to STAGE
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Trigger deployment to STAGE
        env:
          IMAGE_TAG: ${{ needs.publish.outputs.tag }}
          JENKINS_BASIC_AUTH_USER: ${{ secrets.JENKINS_BASIC_AUTH_USER }}
          JENKINS_BASIC_AUTH_PASS: ${{ secrets.JENKINS_BASIC_AUTH_PASS }}
          JENKINS_UPDATE_RELEASE_WEBHOOK: ${{ secrets.JENKINS_UPDATE_DPE_STAGE_WEBHOOK }}
        run: |
          curl -f -u "${JENKINS_BASIC_AUTH_USER}:${JENKINS_BASIC_AUTH_PASS}" \
               -X POST "${JENKINS_UPDATE_RELEASE_WEBHOOK}" \
               -d "Service=dpe&Version=${IMAGE_TAG}"

  trigger-prod-deployment:
    name: Trigger deployment to PROD
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Trigger deployment to PROD
        env:
          IMAGE_TAG: ${{ needs.publish.outputs.tag }}
          JENKINS_BASIC_AUTH_USER: ${{ secrets.JENKINS_BASIC_AUTH_USER }}
          JENKINS_BASIC_AUTH_PASS: ${{ secrets.JENKINS_BASIC_AUTH_PASS }}
          JENKINS_UPDATE_RELEASE_WEBHOOK: ${{ secrets.JENKINS_UPDATE_DPE_PROD_WEBHOOK }}
        run: |
          curl -f -u "${JENKINS_BASIC_AUTH_USER}:${JENKINS_BASIC_AUTH_PASS}" \
               -X POST "${JENKINS_UPDATE_RELEASE_WEBHOOK}" \
               -d "Service=dpe&Version=${IMAGE_TAG}"
