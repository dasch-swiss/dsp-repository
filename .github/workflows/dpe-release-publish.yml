name: Publish DPE release image

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build DPE release
    runs-on: ubuntu-latest
    if: startsWith(github.event.release.tag_name, 'v')
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Extract version from tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: sudo apt-get update -y && sudo apt-get install -y --no-install-recommends musl-tools clang

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install cargo-leptos
        run: cargo binstall cargo-leptos -y --force

      - name: Add build targets
        run: rustup target add wasm32-unknown-unknown x86_64-unknown-linux-musl

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Install pnpm and dependencies
        run: |
          npm install -g pnpm
          cd modules/dpe && CI=true pnpm install --frozen-lockfile

      - name: Build site assets
        run: cargo leptos build --project dpe --release -vv

      - name: Build static musl binary
        run: cargo build -p dpe-server --release --target x86_64-unknown-linux-musl

      - name: Stage artifacts
        run: |
          mkdir -p staging
          cp target/x86_64-unknown-linux-musl/release/dpe-server staging/
          cp -r modules/dpe/target/site staging/
          cp -r modules/dpe/server/data staging/
          cp modules/dpe/Dockerfile staging/

      - uses: actions/upload-artifact@v4
        with:
          name: dpe-release-build
          path: staging/
          retention-days: 1

  publish:
    name: Publish release image
    runs-on: ubuntu-latest
    needs: build
    outputs:
      tag: ${{ needs.build.outputs.tag }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dpe-release-build
          path: staging/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: staging/
          file: staging/Dockerfile
          push: true
          tags: daschswiss/dpe:${{ needs.build.outputs.tag }}

  trigger-stage-deployment:
    name: Trigger deployment to STAGE
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Trigger deployment to STAGE
        env:
          IMAGE_TAG: ${{ needs.publish.outputs.tag }}
          JENKINS_BASIC_AUTH_USER: ${{ secrets.JENKINS_BASIC_AUTH_USER }}
          JENKINS_BASIC_AUTH_PASS: ${{ secrets.JENKINS_BASIC_AUTH_PASS }}
          JENKINS_UPDATE_RELEASE_WEBHOOK: ${{ secrets.JENKINS_UPDATE_DPE_STAGE_WEBHOOK }}
        run: |
          curl -f -u "${JENKINS_BASIC_AUTH_USER}:${JENKINS_BASIC_AUTH_PASS}" \
               -X POST "${JENKINS_UPDATE_RELEASE_WEBHOOK}" \
               -d "Service=dpe&Version=${IMAGE_TAG}"
