name: Docker publish mosaic-playground image

on:
  push:
    branches:
      - main
    paths:
      - "modules/mosaic/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  compute-tag:
    name: Compute image tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate docker image tag
        id: tag
        run: |
          VERSION=$(grep -m1 '^version' modules/mosaic/demo/Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=${VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  publish:
    name: Build and publish mosaic-playground
    needs: compute-tag
    uses: ./.github/workflows/docker-publish.yml
    with:
      dockerfile: modules/mosaic/demo/Dockerfile
      image-name: daschswiss/mosaic-playground
      image-tag: ${{ needs.compute-tag.outputs.tag }}
    secrets:
      DOCKER_USER: ${{ secrets.DOCKER_USER }}
      DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

  trigger-prod-deployment:
    name: Trigger deployment to PROD
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Trigger deployment to PROD
        env:
          IMAGE_TAG: ${{ needs.publish.outputs.tag }}
          JENKINS_BASIC_AUTH_USER: ${{ secrets.JENKINS_BASIC_AUTH_USER }}
          JENKINS_BASIC_AUTH_PASS: ${{ secrets.JENKINS_BASIC_AUTH_PASS }}
          JENKINS_UPDATE_RELEASE_WEBHOOK: ${{ secrets.JENKINS_UPDATE_MOSAIC_PROD_WEBHOOK }}
        run: |
          curl -f -u "${JENKINS_BASIC_AUTH_USER}:${JENKINS_BASIC_AUTH_PASS}" \
               -X POST "${JENKINS_UPDATE_RELEASE_WEBHOOK}" \
               -d "Service=mosaic&Version=${IMAGE_TAG}"
