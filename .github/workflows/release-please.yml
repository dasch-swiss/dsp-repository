name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.repository_owner == 'dasch-swiss'
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release
        with:
          token: ${{ secrets.GH_TOKEN }}
          config-file: .github/release-please/config.json
          manifest-file: .github/release-please/manifest.json

      # Cargo.lock must be regenerated by Cargo after release-please bumps
      # the workspace version in Cargo.toml. The native cargo-workspace
      # plugin cannot handle version.workspace = true (#2111), so we use
      # release-type: simple and regenerate the lockfile ourselves.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        if: steps.release.outputs.pr
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ secrets.GH_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        if: steps.release.outputs.pr

      - name: Update Cargo.lock on release PR
        if: steps.release.outputs.pr
        run: |
          cargo update --workspace
          git diff --quiet Cargo.lock && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: update Cargo.lock for release"
          git push
