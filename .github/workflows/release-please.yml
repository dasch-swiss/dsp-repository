name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.repository_owner == 'dasch-swiss'
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GH_TOKEN }}
          config-file: .github/release-please/config.json
          manifest-file: .github/release-please/manifest.json

      # Cargo.lock must be regenerated by Cargo after release-please bumps
      # the workspace version in Cargo.toml. The native cargo-workspace
      # plugin cannot handle version.workspace = true (#2111), so we use
      # release-type: simple and regenerate the lockfile ourselves.
      #
      # We check for any open release PR (not just newly created ones)
      # because the PR may already exist from a previous run.
      - name: Find release PR branch
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -n '${{ steps.release.outputs.pr }}' ]; then
            BRANCH=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.headBranchName')
          else
            BRANCH=$(gh pr list --repo "${{ github.repository }}" --label "autorelease: pending" --json headRefName --jq '.[0].headRefName // empty')
          fi
          if [ -n "$BRANCH" ]; then
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.find-pr.outputs.branch
        with:
          ref: ${{ steps.find-pr.outputs.branch }}
          token: ${{ secrets.GH_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        if: steps.find-pr.outputs.branch

      - name: Update Cargo.lock on release PR
        if: steps.find-pr.outputs.branch
        run: |
          cargo update --workspace
          git diff --quiet Cargo.lock && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: update Cargo.lock for release"
          git push
