[package]
name = "dpe-server"
version = "0.1.2"
edition = "2021"
publish = false

[dependencies]
dpe-api-oai = { path = "../api-oai" }
dpe-web = { path = "../app", default-features = false, features = ["ssr"] }
leptos = { workspace = true, features = [ "ssr", "islands" ]}
